<svg width="300" height="80" viewBox="0 0 300 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@800&amp;display=swap');
    </style>
  </defs>

  <!-- White background -->
  <rect width="300" height="80" fill="#FFFFFF"/>

  <!-- Icon: rounded square in Electric Blue -->
  <rect x="10" y="8" width="56" height="56" rx="14" fill="#007bff"/>

  <!-- Top bar (white Z) -->
  <rect x="20" y="22" width="36" height="8" rx="2" fill="#FFFFFF"/>

  <!-- Diagonal slash (white Z) -->
  <polygon points="51,30 57,30 25,46 19,46" fill="#FFFFFF"/>

  <!-- Bottom bar (white Z) -->
  <rect x="19" y="46" width="36" height="8" rx="2" fill="#FFFFFF"/>

  <!-- Accent dot (white) -->
  <circle cx="57" cy="52" r="4" fill="#FFFFFF"/>

  <!-- Wordmark in Electric Blue -->
  <text
    x="80" y="51"
    font-family="'Barlow', 'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="800"
    font-size="30"
    letter-spacing="4"
    fill="#007bff"
  >ZUNO</text>
</svg>
